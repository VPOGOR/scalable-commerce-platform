{{- if .Values.monitoring.enabled }}
# ServiceMonitor instructs Prometheus Operator to scrape /metrics from backend services.
# Requires: kube-prometheus-stack (or prometheus-operator) installed in the cluster.
{{- range $name, $svc := $.Values.backend }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "commerce.labels" $ | nindent 4 }}
    # Must match the Prometheus Operator's serviceMonitorSelector label
    release: {{ $.Values.monitoring.prometheusRelease }}
spec:
  selector:
    matchLabels:
      {{- include "commerce.selectorLabels" (dict "name" $name "Release" $.Release) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $.Values.monitoring.interval | default "30s" }}
      scheme: http
{{- end }}
{{- end }}
