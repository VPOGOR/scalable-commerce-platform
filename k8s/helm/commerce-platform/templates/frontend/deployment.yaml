{{- range $name, $svc := .Values.frontend }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "commerce.labels" $ | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ $svc.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "commerce.selectorLabels" (dict "name" $name "Release" $.Release) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "commerce.selectorLabels" (dict "name" $name "Release" $.Release) | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx default non-root user
        runAsGroup: 101
      containers:
        - name: {{ $name }}
          image: {{ include "commerce.image" (dict "svc" $svc "global" $.Values.global) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          # nginx needs writable dirs for cache and pid
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
{{- end }}
