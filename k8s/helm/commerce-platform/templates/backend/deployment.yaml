{{- range $name, $svc := .Values.backend }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "commerce.labels" $ | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ $svc.replicas | default 2 }}
  selector:
    matchLabels:
      {{- include "commerce.selectorLabels" (dict "name" $name "Release" $.Release) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "commerce.selectorLabels" (dict "name" $name "Release" $.Release) | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        # Force pod restart on secret/configmap change
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") $ | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ $name }}
          image: {{ include "commerce.image" (dict "svc" $svc "global" $.Values.global) }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ $svc.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- range $envKey, $secretRef := $svc.secretEnv }}
            - name: {{ $envKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretRef.secretName }}
                  key: {{ $secretRef.key }}
            {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          # Node.js needs a writable /tmp for potential temp files
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
{{- end }}
