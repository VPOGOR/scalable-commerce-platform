apiVersion: v1
kind: Secret
metadata:
  name: commerce-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "commerce.labels" . | nindent 4 }}
type: Opaque
data:
  # Production: use External Secrets Operator to sync from AWS Secrets Manager / Vault
  # and remove this template entirely.
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
