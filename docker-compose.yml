services:
  # Backend services
  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=production
      - PORT=4002
      - JWT_SECRET=${JWT_SECRET}

  # Remote MFEs запускаються ПЕРШИМИ — host залежить від їхніх remoteEntry.js
  catalog:
    build:
      context: .
      dockerfile: apps/catalog/Dockerfile
    ports:
      - "3002:80"

  cart:
    build:
      context: .
      dockerfile: apps/cart/Dockerfile
    ports:
      - "3003:80"

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    ports:
      - "3004:80"

  # Host завантажує remoteEntry.js з catalog/cart/auth після їх старту
  host:
    build:
      context: .
      dockerfile: apps/host/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - catalog
      - cart
      - auth
