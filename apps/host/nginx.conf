server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────

    # X-Frame-Options: захищає від Clickjacking
    # SAMEORIGIN — дозволяє iframe тільки з того самого origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Блокує MIME-type sniffing (browser не буде виконувати .txt як .js)
    add_header X-Content-Type-Options "nosniff" always;

    # Контролює яку інформацію Referer header надсилає при навігації
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Відключає потенційно небезпечні browser API (camera, geolocation тощо)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HSTS — браузер завжди використовує HTTPS (вмикати тільки якщо є HTTPS!)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP для host (Module Federation consumer) — складніша ніж для remotes:
    # - script-src потребує remote MFE origins (localhost:3002-3004)
    # - 'unsafe-eval' потрібен для Module Federation dynamic chunk evaluation
    # - У production: замінити localhost на реальні CDN домени
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' http://localhost:3002 http://localhost:3003 http://localhost:3004 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        connect-src 'self' http://localhost:3002 http://localhost:3003 http://localhost:3004 http://localhost:4000;
        img-src 'self' data: blob:;
        font-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ── Routing ───────────────────────────────────────────────────────────────

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }
}
